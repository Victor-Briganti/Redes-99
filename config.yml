variant: fcos
version: 1.5.0

passwd:
  users:
    - name: core
      ssh_authorized_keys:
        - ${SSH_KEY}

storage:
  directories:
    - path: /opt/app
      mode: 0755
    - path: /opt/app/db
      mode: 0755
    - path: /opt/app/web
      mode: 0755

  files:
    - path: /opt/app/db/Dockerfile
      mode: 0644
      contents:
        local: db/Dockerfile

    - path: /opt/app/db/init.sql
      mode: 0644
      contents:
        local: db/init.sql

    - path: /opt/app/web/Dockerfile
      mode: 0644
      contents:
        local: web/Dockerfile

    - path: /opt/app/web/package-lock.json
      mode: 0644
      contents:
        local: web/package-lock.json

    - path: /opt/app/web/package.json
      mode: 0644
      contents:
        local: web/package.json

    - path: /opt/app/web/server.js
      mode: 0644
      contents:
        local: web/server.js

    - path: /usr/local/bin/build-images.sh
      mode: 0755
      contents:
        inline: |
          #!/usr/bin/env bash
          set -euo pipefail

          podman volume exists my-volume || podman volume create my-volume
          podman network exists my-network || podman network create my-network

          podman build -t localhost/my-db:latest /opt/app/db
          podman build -t localhost/my-web:latest /opt/app/web

          touch /var/lib/build-images.done

systemd:
  units:
    - name: build-images.service
      enabled: true
      contents: |
        [Unit]
        Description=Download source and build local container images
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=!/var/lib/build-images.done

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/build-images.sh
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

    - name: db.service
      enabled: true
      contents: |
        [Unit]
        Description=PostgreSQL database container
        Requires=build-images.service
        After=build-images.service

        [Service]
        Restart=always
        RestartSec=5

        ExecStartPre=-/usr/bin/podman rm -f db

        ExecStart=/usr/bin/podman run \
          --name db \
          --network my-network \
          -p 5432:5432 \
          -v my-volume:/var/lib/postgresql/data:U \
          localhost/my-db:latest

        ExecStop=/usr/bin/podman stop -t 10 db

        [Install]
        WantedBy=multi-user.target

    - name: web.service
      enabled: true
      contents: |
        [Unit]
        Description=Web application container
        Requires=db.service
        After=db.service

        [Service]
        Restart=always
        RestartSec=5

        ExecStartPre=-/usr/bin/podman rm -f web

        ExecStart=/usr/bin/podman run \
          --name web \
          --network my-network \
          -p 3000:3000 \
          localhost/my-web:latest

        ExecStop=/usr/bin/podman stop -t 10 web

        [Install]
        WantedBy=multi-user.target
