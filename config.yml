variant: fcos
version: 1.5.0

storage:
  files:
    - path: /usr/local/bin/build-images.sh
      mode: 0755
      contents:
        inline: |
          #!/usr/bin/env bash
          set -euo pipefail

          mkdir -p /opt/app
          curl -L http://192.168.56.1:8080/app.tar.gz -o /tmp/app.tar.gz
          tar xzf /tmp/app.tar.gz -C /opt/app

          podman build -t localhost/my-db:latest /opt/app/db
          podman build -t localhost/my-web:latest /opt/app/web

          touch /var/lib/build-images.done

    - path: /usr/local/bin/wait-for-db.sh
      mode: 0755
      contents:
        inline: |
          #!/usr/bin/env bash
          set -euo pipefail

          echo "[INFO] Waiting for database..."

          for i in {1..60}; do
            if podman exec db pg_isready -U appuser -d appdb >/dev/null 2>&1; then
              echo "[INFO] Database is ready."
              exit 0
            fi

            echo "[INFO] Database not ready yet..."
            sleep 2
          done

          echo "[ERROR] Database did not become ready in time."
          exit 1

systemd:
  units:
    - name: build-images.service
      enabled: true
      contents: |
        [Unit]
        Description=Download source and build local container images
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=!/var/lib/build-images.done

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/build-images.sh
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

    - name: app-network.service
      enabled: true
      contents: |
        [Unit]
        Description=Create Podman app network
        Wants=network-online.target
        After=network-online.target

        [Service]
        Type=oneshot
        RemainAfterExit=yes
        ExecStart=/bin/bash -c '/usr/bin/podman network exists appnet || /usr/bin/podman network create appnet'

        [Install]
        WantedBy=multi-user.target

    - name: db.service
      enabled: true
      contents: |
        [Unit]
        Description=PostgreSQL database container
        Requires=build-images.service app-network.service
        After=build-images.service app-network.service

        [Service]
        Restart=always
        RestartSec=5

        ExecStartPre=-/usr/bin/podman rm -f db

        ExecStart=/usr/bin/podman run \
          --name db \
          --network appnet \
          -p 5432:5432 \
          -e POSTGRES_DB=appdb \
          -e POSTGRES_USER=appuser \
          -e POSTGRES_PASSWORD=123mudar \
          -v db-data:/var/lib/postgresql/data:Z \
          localhost/my-db:latest

        ExecStop=/usr/bin/podman stop -t 10 db

        [Install]
        WantedBy=multi-user.target

    - name: web.service
      enabled: true
      contents: |
        [Unit]
        Description=Web application container
        Requires=db.service
        After=db.service

        [Service]
        Restart=always
        RestartSec=5

        ExecStartPre=/usr/local/bin/wait-for-db.sh
        ExecStartPre=-/usr/bin/podman rm -f web

        ExecStart=/usr/bin/podman run \
          --name web \
          --network appnet \
          -p 3000:3000 \
          -e DB_HOST=db \
          -e DB_PORT=5432 \
          -e DB_NAME=appdb \
          -e DB_USER=appuser \
          -e DB_PASS=123mudar \
          localhost/my-web:latest

        ExecStop=/usr/bin/podman stop -t 10 web

        [Install]
        WantedBy=multi-user.target
