variant: fcos
version: 1.5.0

# passwd:
#   users:
#     - name: core
#       ssh_authorized_keys:
#         - ${SSH_KEY}

storage:
  directories:
    - path: /opt/app
      mode: 0755
    - path: /opt/app/db
      mode: 0755
    - path: /opt/app/web
      mode: 0755
    - path: /var/lib/app
      mode: 0755
    - path: /var/lib/app/postgresql
      mode: 0755

  files:
    - path: /opt/app/db/Dockerfile
      mode: 0644
      contents:
        local: db/Dockerfile

    - path: /opt/app/db/init.sql
      mode: 0644
      contents:
        local: db/init.sql

    - path: /opt/app/web/Dockerfile
      mode: 0644
      contents:
        local: web/Dockerfile

    - path: /opt/app/web/package-lock.json
      mode: 0644
      contents:
        local: web/package-lock.json

    - path: /opt/app/web/package.json
      mode: 0644
      contents:
        local: web/package.json

    - path: /opt/app/web/server.js
      mode: 0644
      contents:
        local: web/server.js

    - path: /usr/local/bin/build-images.sh
      mode: 0755
      contents:
        inline: |
          #!/usr/bin/env bash
          set -euo pipefail

          podman network exists app-network || podman network create app-network

          podman build -t localhost/app-db:latest /opt/app/db
          podman build -t localhost/app-web:latest /opt/app/web

          exit 0

systemd:
  units:
    - name: build-images.service
      enabled: true
      contents: |
        [Unit]
        Description=Download source and build local container images
        Wants=network-online.target
        After=network-online.target
        ConditionPathExists=!/var/lib/build-images.done

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/build-images.sh
        RemainAfterExit=yes

        [Install]
        WantedBy=multi-user.target

    - name: db.service
      enabled: true
      contents: |
        [Unit]
        Description=PostgreSQL database container
        Requires=build-images.service
        After=build-images.service

        [Service]
        Restart=always
        RestartSec=5

        ExecStartPre=-/usr/bin/podman rm -f db
        ExecStartPre=/usr/bin/bash -c 'if [ ! -s /var/lib/app/postgresql/PG_VERSION ] && /usr/bin/podman volume exists app-volume; then /usr/bin/podman run --rm --user root --entrypoint /bin/sh -v app-volume:/old:Z,U -v /var/lib/app/postgresql:/target:Z,U localhost/app-db:latest -c "cp -a /old/. /target/"; fi'
        ExecStartPre=/usr/bin/podman run --rm --user root --entrypoint /bin/sh -v /var/lib/app/postgresql:/target:Z,U localhost/app-db:latest -c 'if [ ! -s /target/PG_VERSION ]; then cp -a /var/lib/postgresql/17/main/. /target/; fi; chown -R postgres:postgres /target; chmod 700 /target'

        ExecStart=/usr/bin/podman run \
          --name db \
          --network app-network \
          -p 5432:5432 \
          -v /var/lib/app/postgresql:/var/lib/postgresql/17/main:Z,U \
          localhost/app-db:latest

        ExecStop=/usr/bin/podman stop -t 10 db

        [Install]
        WantedBy=multi-user.target

    - name: web.service
      enabled: true
      contents: |
        [Unit]
        Description=Web application container
        Requires=build-images.service
        After=build-images.service

        [Service]
        Restart=always
        RestartSec=5

        ExecStartPre=-/usr/bin/podman rm -f web

        ExecStart=/usr/bin/podman run \
          --name web \
          --network app-network \
          -p 3000:3000 \
          localhost/app-web:latest

        ExecStop=/usr/bin/podman stop -t 10 web

        [Install]
        WantedBy=multi-user.target
